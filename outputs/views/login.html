<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TimeKids</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode auth-page">
  <div class="auth-container">
    <!-- Auth Card -->
    <div class="auth-card">
      <!-- Header -->
      <div class="auth-header">
        <h1>🌙 TimeKids</h1>
        <h2>Welcome Back</h2>
        <p>Let's get back to peaceful nights</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your@email.com"
            required
            class="form-input"
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            required
            class="form-input"
          >
          <span class="error-message" id="passwordError"></span>
        </div>

        <!-- Remember Me -->
        <div class="form-checkbox">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-block">
          <span id="buttonText">Sign In</span>
          <span id="loadingSpinner" class="spinner" style="display: none;"></span>
        </button>

        <!-- Error Message -->
        <div class="alert alert-error" id="errorAlert" style="display: none;"></div>

        <!-- Success Message -->
        <div class="alert alert-success" id="successAlert" style="display: none;"></div>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Social Login (Future Enhancement) -->
      <div class="social-login">
        <button type="button" class="btn-social disabled" title="Coming soon">
          Google
        </button>
        <button type="button" class="btn-social disabled" title="Coming soon">
          Apple
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Don't have an account? <a href="/signup" class="link">Sign up here</a></p>
        <p><a href="#" class="link">Forgot password?</a></p>
      </div>
    </div>

    <!-- Illustration Side (Desktop Only) -->
    <div class="auth-illustration">
      <div class="illustration-content">
        <div class="moon">🌙</div>
        <div class="stars">⭐</div>
        <p>Sweet dreams awaiting...</p>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/auth.js"></script>
  <script>
    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const buttonText = document.getElementById('buttonText');
      const spinner = document.getElementById('loadingSpinner');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      // Clear previous errors
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('successAlert').style.display = 'none';

      // Validation
      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        return;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      buttonText.style.display = 'none';
      spinner.style.display = 'inline-block';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Show success message
        const successAlert = document.getElementById('successAlert');
        successAlert.textContent = 'Login successful! Redirecting...';
        successAlert.style.display = 'block';

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1500);

      } catch (error) {
        // Show error
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.textContent = error.message;
        errorAlert.style.display = 'block';

        // Reset button
        submitBtn.disabled = false;
        buttonText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
