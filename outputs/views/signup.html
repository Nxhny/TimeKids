<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - TimeKids</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode auth-page">
  <div class="auth-container">
    <!-- Auth Card -->
    <div class="auth-card">
      <!-- Header -->
      <div class="auth-header">
        <h1>🌙 TimeKids</h1>
        <h2>Create Your Account</h2>
        <p>Start peaceful bedtimes today</p>
      </div>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form">
        <!-- Name Input -->
        <div class="form-group">
          <label for="name">Your Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Enter your name"
            required
            class="form-input"
          >
          <span class="error-message" id="nameError"></span>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="your@email.com"
            required
            class="form-input"
          >
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Minimum 8 characters"
            required
            class="form-input"
          >
          <span class="error-message" id="passwordError"></span>
          <div class="password-strength">
            <div class="strength-bar"></div>
            <span class="strength-text">Password strength</span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            placeholder="Confirm your password"
            required
            class="form-input"
          >
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <!-- Terms & Conditions -->
        <div class="form-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
          </label>
          <span class="error-message" id="termsError"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-block">
          <span id="buttonText">Create Account</span>
          <span id="loadingSpinner" class="spinner" style="display: none;"></span>
        </button>

        <!-- Error Message -->
        <div class="alert alert-error" id="errorAlert" style="display: none;"></div>

        <!-- Success Message -->
        <div class="alert alert-success" id="successAlert" style="display: none;"></div>
      </form>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Already have an account? <a href="/login" class="link">Sign in here</a></p>
      </div>
    </div>

    <!-- Illustration Side (Desktop Only) -->
    <div class="auth-illustration">
      <div class="illustration-content">
        <div class="moon">🌙</div>
        <div class="stars">✨⭐</div>
        <p>Join the TimeKids family</p>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/auth.js"></script>
  <script>
    // Password strength indicator
    document.getElementById('password').addEventListener('input', (e) => {
      const password = e.target.value;
      const strengthBar = document.querySelector('.strength-bar');
      const strengthText = document.querySelector('.strength-text');
      
      let strength = 0;
      
      if (password.length >= 8) strength += 25;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
      if (/[0-9]/.test(password)) strength += 25;
      if (/[^a-zA-Z0-9]/.test(password)) strength += 25;
      
      strengthBar.style.width = strength + '%';
      
      if (strength < 25) {
        strengthBar.style.backgroundColor = '#ff6b6b';
        strengthText.textContent = 'Weak';
      } else if (strength < 50) {
        strengthBar.style.backgroundColor = '#ffa500';
        strengthText.textContent = 'Fair';
      } else if (strength < 75) {
        strengthBar.style.backgroundColor = '#ffeb3b';
        strengthText.textContent = 'Good';
      } else {
        strengthBar.style.backgroundColor = '#4caf50';
        strengthText.textContent = 'Strong';
      }
    });

    // Signup form handler
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;
      const buttonText = document.getElementById('buttonText');
      const spinner = document.getElementById('loadingSpinner');
      const submitBtn = e.target.querySelector('button[type="submit"]');

      // Clear previous errors
      document.getElementById('nameError').textContent = '';
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('confirmPasswordError').textContent = '';
      document.getElementById('termsError').textContent = '';
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('successAlert').style.display = 'none';

      // Validation
      if (!name) {
        document.getElementById('nameError').textContent = 'Name is required';
        return;
      }

      if (!email) {
        document.getElementById('emailError').textContent = 'Email is required';
        return;
      }

      if (!password) {
        document.getElementById('passwordError').textContent = 'Password is required';
        return;
      }

      if (password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        return;
      }

      if (password !== confirmPassword) {
        document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
        return;
      }

      if (!terms) {
        document.getElementById('termsError').textContent = 'You must agree to the terms';
        return;
      }

      // Show loading state
      submitBtn.disabled = true;
      buttonText.style.display = 'none';
      spinner.style.display = 'inline-block';

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Signup failed');
        }

        // Show success message
        const successAlert = document.getElementById('successAlert');
        successAlert.textContent = 'Account created! Check your email to confirm.';
        successAlert.style.display = 'block';

        // Clear form
        e.target.reset();

        // Redirect to login after delay
        setTimeout(() => {
          window.location.href = '/login';
        }, 2000);

      } catch (error) {
        // Show error
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.textContent = error.message;
        errorAlert.style.display = 'block';

        // Reset button
        submitBtn.disabled = false;
        buttonText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
