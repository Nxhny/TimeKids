<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player - TimeKids</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/player.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode player-page">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <h1>🌙 TimeKids</h1>
      </div>
      <div class="navbar-menu">
        <a href="/dashboard" class="nav-link">Home</a>
        <a href="/player" class="nav-link active">Player</a>
        <a href="/favorites" class="nav-link">❤️ Favorites</a>
        <button class="btn-theme" id="themeToggle" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </nav>

  <!-- Player Container -->
  <div class="player-full-container">
    <!-- Background Blur -->
    <div class="player-bg" id="playerBg"></div>

    <!-- Player Card -->
    <div class="player-card">
      <!-- Close Button -->
      <a href="/dashboard" class="btn-close">✕</a>

      <!-- Cover Art -->
      <div class="player-cover">
        <div id="coverArt" class="cover-art">
          <div class="cover-placeholder">🎵</div>
        </div>
        <div class="cover-overlay"></div>
      </div>

      <!-- Metadata -->
      <div class="player-metadata">
        <div class="meta-type" id="metaType">Lullaby</div>
        <h1 id="metaTitle" class="meta-title">Select a track</h1>
        <p id="metaCategory" class="meta-category">Category</p>
      </div>

      <!-- Main Player -->
      <div class="player-center">
        <!-- Progress Bar -->
        <div class="progress-container">
          <span id="currentTime" class="time-label">0:00</span>
          <div class="progress-wrapper">
            <input 
              type="range" 
              id="progressBar" 
              class="progress-bar" 
              min="0" 
              max="100" 
              value="0"
            >
            <div class="progress-fill"></div>
          </div>
          <span id="duration" class="time-label">0:00</span>
        </div>

        <!-- Main Controls -->
        <div class="controls-main">
          <button id="previousBtn" class="control-btn large" title="Previous">⏮️</button>
          <button id="playBtn" class="control-btn play-btn" title="Play/Pause">▶️</button>
          <button id="nextBtn" class="control-btn large" title="Next">⏭️</button>
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
          <span class="volume-icon">🔊</span>
          <input 
            type="range" 
            id="volumeBar" 
            class="volume-bar" 
            min="0" 
            max="100" 
            value="70"
          >
          <span id="volumeValue" class="volume-value">70%</span>
        </div>
      </div>

      <!-- Utility Controls -->
      <div class="controls-utility">
        <button id="repeatBtn" class="utility-btn" title="Repeat">🔄</button>
        <button id="favoriteBtn" class="utility-btn" title="Add to favorites">🤍</button>
        <button id="timerBtn" class="utility-btn" title="Sleep timer">⏰</button>
        <button id="shareBtn" class="utility-btn" title="Share">📤</button>
      </div>

      <!-- Timer Display -->
      <div id="timerDisplay" class="timer-display-large" style="display: none;">
        <div class="timer-icon">⏰</div>
        <div id="timerText" class="timer-text">15:00</div>
        <button id="cancelTimer" class="timer-cancel">✕</button>
      </div>
    </div>

    <!-- Side Panel: Queue/Favorites -->
    <aside class="player-sidebar">
      <div class="sidebar-header">
        <h3>📚 Queue</h3>
        <button id="clearQueueBtn" class="btn-small">Clear</button>
      </div>

      <div id="queueContainer" class="queue-list">
        <p class="empty-message">Queue is empty. Start playing from the dashboard!</p>
      </div>
    </aside>
  </div>

  <!-- Timer Modal -->
  <div id="timerModal" class="modal" style="display: none;">
    <div class="modal-content timer-modal">
      <h2>Set Sleep Timer</h2>
      <div class="timer-grid">
        <button class="timer-option" data-minutes="5">5 minutes</button>
        <button class="timer-option" data-minutes="10">10 minutes</button>
        <button class="timer-option" data-minutes="15">15 minutes</button>
        <button class="timer-option" data-minutes="20">20 minutes</button>
        <button class="timer-option" data-minutes="30">30 minutes</button>
        <button class="timer-option" data-minutes="45">45 minutes</button>
        <button class="timer-option" data-minutes="60">1 hour</button>
        <button class="timer-option" data-minutes="0">Cancel Timer</button>
      </div>
      <button class="btn btn-secondary modal-close">Close</button>
    </div>
  </div>

  <!-- Audio Element (Hidden) -->
  <audio id="audioElement"></audio>

  <!-- Scripts -->
  <script src="/js/audioPlayer.js"></script>
  <script src="/js/playerPage.js"></script>
</body>
</html>
