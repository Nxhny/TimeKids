<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites - TimeKids</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/favorites.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">
        <h1>🌙 TimeKids</h1>
      </div>
      <div class="navbar-menu">
        <a href="/dashboard" class="nav-link">Home</a>
        <a href="/player" class="nav-link">Player</a>
        <a href="/favorites" class="nav-link active">❤️ Favorites</a>
        <a href="/profile" class="nav-link">👤 Profile</a>
        <button class="btn-theme" id="themeToggle" title="Toggle dark mode">🌙</button>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="favorites-container">
    <!-- Header -->
    <section class="favorites-header">
      <div class="header-content">
        <h1>❤️ Your Favorites</h1>
        <p id="favoriteCount">0 items saved</p>
      </div>
      <button id="clearAllBtn" class="btn btn-secondary">Clear All</button>
    </section>

    <!-- Filter Tabs -->
    <section class="filter-tabs">
      <button class="tab-btn active" data-filter="all">All</button>
      <button class="tab-btn" data-filter="lullaby">🎵 Lullabies</button>
      <button class="tab-btn" data-filter="story">📖 Stories</button>
    </section>

    <!-- Favorites Grid -->
    <section class="favorites-content">
      <div id="favoritesGrid" class="audio-grid">
        <!-- Skeleton loaders -->
        <div class="audio-card skeleton"></div>
        <div class="audio-card skeleton"></div>
        <div class="audio-card skeleton"></div>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-icon">🤍</div>
        <h2>No Favorites Yet</h2>
        <p>Start exploring and add your favorite lullabies and stories!</p>
        <a href="/dashboard" class="btn btn-primary">Browse Content</a>
      </div>
    </section>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>Remove from Favorites?</h2>
      <p id="confirmMessage">Are you sure you want to remove this item?</p>
      <div class="modal-actions">
        <button id="confirmYesBtn" class="btn btn-danger">Remove</button>
        <button id="confirmNoBtn" class="btn btn-secondary">Keep</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/app.js"></script>
  <script src="/js/favorites.js"></script>
</body>
</html>
