<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Playlists — TimeKids 🌙</title>
  <link rel="icon" href="/assets/logo.png" type="image/png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6bb5d6" />
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/i18n.css" />
  <style>
    .playlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .playlist-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
    }
    .playlist-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .playlist-card-cover {
      aspect-ratio: 2/1;
      background: linear-gradient(135deg, var(--lav-100), var(--sky-100));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      position: relative;
    }
    .playlist-card-cover.has-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      font-size: 1.6rem;
    }
    .playlist-card-cover.has-items span {
      display: flex; align-items: center; justify-content: center;
      background: var(--sky-100);
      height: 100%;
    }
    .playlist-card-cover.has-items span:nth-child(2) { background: var(--lav-100); }
    .playlist-card-cover.has-items span:nth-child(3) { background: var(--peach-100); }
    .playlist-card-cover.has-items span:nth-child(4) { background: var(--mint-100); }
    .playlist-card-body { padding: 16px; }
    .playlist-card-name { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .playlist-card-meta { font-size: 0.78rem; color: var(--text-muted); }
    .playlist-card-actions { display: flex; gap: 6px; margin-top: 12px; }

    /* Create card */
    .playlist-new-card {
      background: var(--sky-50);
      border: 2px dashed var(--border);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 10px;
      min-height: 180px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .playlist-new-card:hover { border-color: var(--primary); color: var(--primary); background: var(--sky-100); }
    .playlist-new-card .plus { font-size: 2rem; }

    /* Playlist detail panel */
    .playlist-detail { display: none; }
    .playlist-detail.open { display: block; }
    .track-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      transition: var(--transition);
      cursor: pointer;
    }
    .track-row:hover { background: var(--sky-50); }
    .track-row-num { width: 24px; text-align: center; font-size: 0.78rem; color: var(--text-muted); }
    .track-row-info { flex: 1; min-width: 0; }
    .track-row-title { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-row-meta { font-size: 0.75rem; color: var(--text-muted); }
    .track-row-actions { display: flex; gap: 4px; opacity: 0; transition: var(--transition); }
    .track-row:hover .track-row-actions { opacity: 1; }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/logo.png" alt="TimeKids"/>
      <div class="sidebar-logo-text">Time<span>Kids</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Discover</div>
        <a href="/dashboard" class="nav-link"><span class="nav-icon">🏠</span> All Content</a>
        <a href="/dashboard?view=lullaby" class="nav-link"><span class="nav-icon">🎵</span> Lullabies</a>
        <a href="/dashboard?view=story" class="nav-link"><span class="nav-icon">📖</span> Stories</a>
        <a href="/dashboard?view=favorites" class="nav-link"><span class="nav-icon">❤️</span> Favourites</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">My Library</div>
        <a href="/playlists" class="nav-link active"><span class="nav-icon">📋</span> Playlists</a>
        <a href="/dashboard?view=my-uploads" class="nav-link"><span class="nav-icon">📤</span> My Uploads</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="/profile" class="nav-link" style="margin-bottom:6px;">
        <div id="user-avatar" style="width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:white;font-weight:700;">?</div>
        <div id="user-name" style="color:rgba(255,255,255,0.85);font-size:0.88rem;font-weight:700;">…</div>
      </a>
      <div id="lang-switcher-slot" style="margin-bottom:8px;"></div>
      <button class="nav-link" id="logout-btn" style="width:100%;color:rgba(255,100,100,0.7);">
        <span class="nav-icon">🚪</span> Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <h2 style="font-size:1.3rem;" id="page-heading"><span data-i18n="pl.title">📋 My Playlists</span></h2>
      <div style="display:flex;gap:8px;">
        <button id="btn-new-playlist" class="btn btn-primary btn-sm"><span data-i18n="pl.new_btn">+ New Playlist</span></button>
        <button id="theme-toggle" class="btn btn-ghost btn-sm">🌙</button>
      </div>
    </header>

    <div class="page-content">

      <!-- Playlists grid -->
      <div id="playlists-view">
        <div class="playlist-grid" id="playlist-grid">
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl);"></div>
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl);"></div>
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl);"></div>
        </div>
      </div>

      <!-- Playlist detail -->
      <div id="playlist-detail" class="playlist-detail">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
          <button class="btn btn-ghost btn-sm" id="back-to-playlists">← Back</button>
          <h3 id="detail-name" style="flex:1;"></h3>
          <button class="btn btn-primary btn-sm" id="play-all-btn">▶ Play All</button>
          <button class="btn btn-danger btn-sm" id="delete-playlist-btn">🗑️ Delete</button>
        </div>
        <div id="detail-description" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:20px;"></div>
        <div id="track-list" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;"></div>
      </div>

    </div>
  </div>
</div>

<!-- New Playlist Modal -->
<div class="modal-backdrop" id="new-playlist-modal">
  <div class="modal">
    <div class="modal-header">
      <h3><span data-i18n="pl.modal_title">📋 New Playlist</span></h3>
      <button class="btn btn-ghost btn-icon-sm" id="close-pl-modal">✕</button>
    </div>
    <div class="modal-body">
      <form id="new-playlist-form" style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label class="form-label"><span data-i18n="pl.name_label">Playlist Name *</span></label>
          <input class="form-input" name="name" type="text" placeholder="e.g. Bedtime Classics" data-i18n-placeholder="pl.name_ph" required/>
        </div>
        <div class="form-group">
          <label class="form-label"><span data-i18n="pl.desc_label">Description</span></label>
          <textarea class="form-input" name="description" rows="2" placeholder="Optional description…" data-i18n-placeholder="modal.desc" style="resize:vertical;"></textarea>
        </div>
        <div id="pl-form-msg" class="form-message"></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button type="button" class="btn btn-ghost" id="cancel-pl-modal"><span data-i18n="modal.cancel">Cancel</span></button>
          <button type="submit" class="btn btn-primary"><span data-i18n="pl.create_btn">Create Playlist 📋</span></button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Audio player bar (minimal on this page) -->
<div class="player-bar hidden" id="player-bar">
  <div class="player-track">
    <div class="player-art" id="player-art">🎵</div>
    <div class="player-info">
      <div class="player-title" id="player-title">No track selected</div>
      <div class="player-category" id="player-category">—</div>
    </div>
  </div>
  <div class="player-controls">
    <div class="player-buttons">
      <button class="player-btn" id="prev-btn">⏮</button>
      <button class="player-btn player-btn-play" id="play-btn">▶</button>
      <button class="player-btn" id="next-btn">⏭</button>
    </div>
    <div class="player-progress-wrap">
      <span class="player-time" id="current-time">0:00</span>
      <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="player-time" id="total-time">0:00</span>
    </div>
  </div>
  <div class="player-extras">
    <div class="volume-wrap">
      <span>🔊</span>
      <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="0.8"/>
    </div>
  </div>
</div>

<audio id="audio-player" preload="metadata"></audio>

<script type="module" src="/js/playlists.js"></script>

<script type="module">
  import { applyTranslations, renderLanguageSwitcher } from '/js/i18n.js';
  applyTranslations();
  renderLanguageSwitcher('#lang-switcher-slot');
  window.addEventListener('langchange', () => applyTranslations());
</script>
</body>
</html>
