<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — TimeKids 🌙</title>
  <link rel="icon" href="/assets/logo.png" type="image/png"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#6bb5d6"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/auth.css"/>
  <link rel="stylesheet" href="/css/i18n.css"/>
</head>
<body>
<div class="auth-page">

  <div class="auth-panel">
    <span class="panel-star" style="width:8px;height:8px;background:#fde68a;top:15%;left:22%;animation-delay:0s;"></span>
    <span class="panel-star" style="width:6px;height:6px;background:#c4b5fd;top:55%;left:70%;animation-delay:1.5s;"></span>
    <div class="auth-panel-content">
      <img src="/assets/logo.png" alt="TimeKids" class="auth-logo"/>
      <h1>Choose a new<br/><span>password 🔑</span></h1>
      <p>Make it strong and memorable. At least 8 characters.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <div id="invalid-link" style="display:none;text-align:center;padding:40px 0;">
        <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
        <!-- ✅ CORRECTION : Ajouter data-i18n pour traduction -->
        <h3 style="margin-bottom:10px;" data-i18n="reset.invalid_title">Invalid or expired link</h3>
        <p style="color:var(--text-secondary);margin-bottom:24px;" data-i18n="reset.invalid_desc">This reset link has expired or is invalid. Please request a new one.</p>
        <!-- ✅ CORRECTION : Ajouter data-i18n pour le bouton -->
        <a href="/forgot-password" class="btn btn-primary" data-i18n="reset.invalid_link">Request New Link</a>
      </div>

      <div id="form-wrap">
        <div class="auth-form-header">
          <h2 data-i18n="reset.title">Set new password 🔑</h2>
          <p data-i18n="reset.subtitle">Enter your new password below.</p>
        </div>

        <div id="form-message" class="form-message"></div>

        <form class="auth-form" id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label" data-i18n="reset.new_pw">New Password</label>
            <div style="position:relative;">
              <input class="form-input" type="password" id="new_password" name="new_password"
                placeholder="At least 8 characters" required autocomplete="new-password"
                style="padding-right:44px;"/>
              <button type="button" id="toggle-pw" class="btn-icon-sm"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);">👁️</button>
            </div>
            <!-- Strength bar -->
            <div class="password-strength" id="pw-strength" style="display:none;">
              <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
              <span class="strength-text" id="strength-text"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="reset.confirm_pw">Confirm Password</label>
            <input class="form-input" type="password" id="confirm_password"
              placeholder="Repeat new password" required autocomplete="new-password"/>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
            <span id="btn-text" data-i18n="reset.btn">Update Password</span>
            <span id="btn-spinner" style="display:none;">⏳</span>
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

<div id="lang-switcher-slot" style="position:fixed;bottom:20px;right:20px;z-index:100;"></div>

<script type="module">
  import api from '/js/api.js';
  import { applyTranslations, renderLanguageSwitcher, t } from '/js/i18n.js';

  applyTranslations();
  renderLanguageSwitcher('#lang-switcher-slot');
  window.addEventListener('langchange', () => applyTranslations());

  // Extract access_token from URL hash (Supabase sends it as #access_token=...)
  const hash   = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token  = params.get('access_token');
  const type   = params.get('type'); // 'recovery'

  if (!token || type !== 'recovery') {
    document.getElementById('form-wrap').style.display  = 'none';
    document.getElementById('invalid-link').style.display = 'block';
  }

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', function () {
    const pw = document.getElementById('new_password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.textContent = pw.type === 'password' ? '👁️' : '🙈';
  });

  // Strength meter
  document.getElementById('new_password').addEventListener('input', function () {
    const el   = document.getElementById('pw-strength');
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    if (!this.value) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    let s = 0;
    if (this.value.length >= 8) s++;
    if (/[A-Z]/.test(this.value)) s++;
    if (/[0-9]/.test(this.value)) s++;
    if (/[^A-Za-z0-9]/.test(this.value)) s++;
    const levels = [
      { w:'25%', bg:'#f87171', key:'pw.weak' },
      { w:'50%', bg:'#fbbf24', key:'pw.fair' },
      { w:'75%', bg:'#60a5fa', key:'pw.good' },
      { w:'100%',bg:'#34d399', key:'pw.strong' },
    ];
    const lvl = levels[Math.max(s - 1, 0)];
    fill.style.width = lvl.w; fill.style.background = lvl.bg;
    text.textContent = t(lvl.key);
  });

  // Form submit
  const form    = document.getElementById('reset-form');
  const btn     = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const spinner = document.getElementById('btn-spinner');
  const msgEl   = document.getElementById('form-message');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const pw1 = document.getElementById('new_password').value;
    const pw2 = document.getElementById('confirm_password').value;

    if (pw1.length < 8) { showMsg(t('register.pw_short'), 'error'); return; }
    if (pw1 !== pw2)    { showMsg(t('reset.mismatch'), 'error'); return; }

    btn.disabled = true; btnText.style.opacity = '.5'; spinner.style.display = 'inline';

    try {
      await api.post('/auth/reset-password', { access_token: token, new_password: pw1 });
      showMsg(t('reset.success'), 'success');
      setTimeout(() => window.location.href = '/login', 2000);
    } catch (err) {
      showMsg(err.message || t('error.generic'), 'error');
    } finally {
      btn.disabled = false; btnText.style.opacity = '1'; spinner.style.display = 'none';
    }
  });

  function showMsg(text, type) {
    msgEl.className = `form-message ${type}`;
    msgEl.innerHTML = `<span>${type === 'error' ? '❌' : '✅'}</span> ${text}`;
  }
</script>
</body>
</html>
